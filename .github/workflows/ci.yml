name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install -g npm@11

      - run: npm ci

      - run: npm run typecheck

      - run: npm test -- --coverage

      - run: npm run build:prod
